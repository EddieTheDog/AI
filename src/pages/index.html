<!-- src/pages/index.html -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SIA — Your intelligent assistant." />
  <meta name="robots" content="noindex, nofollow" />
  <title>SIA</title>

  <!-- Preload key fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Styles -->
  <link rel="stylesheet" href="/css/main.css" />
  <!-- highlight.js theme handled via main.css hljs overrides -->

  <!-- highlight.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" defer></script>

  <!-- marked.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js" defer></script>

  <style>
    /* Inline critical: prevent flash */
    html { background: #0d0d0f; }
  </style>
</head>
<body>

<div id="app">

  <!-- ── Sidebar ──────────────────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar" aria-label="Conversations">

    <div class="sidebar-header">
      <span class="sidebar-logo">S<span>IA</span></span>
      <button class="icon-btn" id="sidebar-close-btn" aria-label="Close sidebar" style="display:none">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- New chat -->
    <button class="new-chat-btn" id="new-chat-btn" aria-label="New conversation">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      New chat
    </button>

    <!-- Search conversations -->
    <div class="sidebar-search">
      <input
        type="search"
        id="conv-search"
        placeholder="Search conversations..."
        aria-label="Search conversations"
        autocomplete="off"
      />
    </div>

    <!-- Conversation list -->
    <nav id="conversation-list" aria-label="Conversation history">
      <p class="sidebar-empty">Loading...</p>
    </nav>

    <!-- User footer -->
    <div class="sidebar-footer">
      <div class="user-chip" id="user-chip" role="button" aria-haspopup="true" tabindex="0" aria-label="Account menu">
        <div class="user-avatar" id="user-avatar-initials">--</div>
        <span class="user-name" id="user-display-name">Loading...</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity:0.4">
          <circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/>
        </svg>
      </div>
    </div>

  </aside>

  <!-- ── Main ─────────────────────────────────────────────────────────── -->
  <main class="main" id="main">

    <!-- Top bar -->
    <header class="topbar" id="topbar">
      <button class="icon-btn menu-btn" id="menu-btn" aria-label="Open sidebar">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <h1 class="topbar-title" id="topbar-title">SIA</h1>

      <div class="topbar-actions">
        <!-- Memory toggle -->
        <button class="icon-btn" id="memory-btn" aria-label="Memory" title="Memory">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          </svg>
        </button>

        <!-- Share button (visible on active conversation) -->
        <button class="icon-btn" id="share-btn" aria-label="Share conversation" title="Share" style="display:none">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Messages -->
    <div id="messages-container" role="log" aria-live="polite" aria-label="Conversation messages">

      <!-- Empty state — shown when no active conversation or on /new -->
      <div class="empty-state" id="empty-state">
        <div class="empty-logo" aria-hidden="true">
          <svg width="26" height="26" viewBox="0 0 32 32" fill="none">
            <circle cx="16" cy="16" r="16" fill="var(--accent)"/>
            <path d="M10 20 Q16 10 22 20" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <circle cx="16" cy="14" r="2.5" fill="white"/>
          </svg>
        </div>
        <h2 class="empty-title">How can I help?</h2>
        <p class="empty-sub">Ask me anything. I remember our conversations and learn over time.</p>

        <div class="starter-grid" id="starter-grid">
          <button class="starter-card" data-prompt="Explain how large language models work in simple terms">
            <strong>Learn</strong>
            How do large language models work?
          </button>
          <button class="starter-card" data-prompt="Write a Python function that checks if a string is a palindrome">
            <strong>Code</strong>
            Write a palindrome checker in Python
          </button>
          <button class="starter-card" data-prompt="Help me write a professional email declining a meeting request">
            <strong>Write</strong>
            Draft a polite email declining a meeting
          </button>
          <button class="starter-card" data-prompt="What are three habits that actually improve focus and deep work?">
            <strong>Explore</strong>
            Habits that genuinely improve focus
          </button>
        </div>
      </div>

    </div>

    <!-- Input area -->
    <div class="input-area" id="input-area">
      <div class="input-wrapper">

        <!-- Cancel button (shown while waiting for response) -->
        <button id="cancel-btn" aria-label="Cancel response">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
          </svg>
          Stop generating
        </button>

        <div class="input-box" id="input-box">

          <!-- Image preview strip -->
          <div class="image-preview-strip" id="image-preview-strip">
            <div class="img-preview-thumb" id="img-preview-thumb" style="display:none">
              <img id="img-preview-img" src="" alt="Upload preview" />
              <button class="img-preview-remove" id="img-preview-remove" aria-label="Remove image">
                <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                  <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Upload progress bar -->
          <div class="upload-progress" id="upload-progress"></div>

          <!-- Textarea row -->
          <div class="textarea-row">
            <textarea
              id="message-input"
              placeholder="Message SIA..."
              rows="1"
              aria-label="Message input"
              autocomplete="off"
              spellcheck="true"
            ></textarea>

            <div class="input-tools">
              <!-- Image upload -->
              <button class="tool-btn" id="image-upload-btn" aria-label="Attach image" title="Attach image">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                  <circle cx="8.5" cy="8.5" r="1.5"/>
                  <polyline points="21 15 16 10 5 21"/>
                </svg>
              </button>
              <input type="file" id="image-file-input" accept="image/*" style="display:none" aria-hidden="true" />

              <!-- Send -->
              <button id="send-btn" aria-label="Send message" disabled>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <line x1="22" y1="2" x2="11" y2="13"/>
                  <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
              </button>
            </div>
          </div>

        </div>

        <p class="input-hint">SIA can make mistakes. Verify important information.</p>
      </div>
    </div>

  </main>

</div>

<!-- ── Memory Panel ──────────────────────────────────────────────────────── -->
<aside class="memory-panel" id="memory-panel" aria-label="Memory" aria-hidden="true">
  <div class="panel-header">
    <h2 class="panel-title">Memory</h2>
    <button class="panel-close icon-btn" id="memory-close-btn" aria-label="Close memory panel">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <div class="memory-search">
    <input type="search" id="memory-search-input" placeholder="Search memories..." aria-label="Search memories" />
  </div>

  <div class="memory-list" id="memory-list">
    <p class="sidebar-empty" style="padding:20px">No memories yet.</p>
  </div>

  <div class="memory-add">
    <input
      type="text"
      id="memory-add-input"
      placeholder="Add a memory..."
      aria-label="Add memory"
      maxlength="500"
    />
    <button class="btn btn-primary btn-sm" id="memory-add-btn">Save</button>
  </div>
</aside>

<!-- ── Scripts ───────────────────────────────────────────────────────────── -->
<script type="module" src="/js/app.js"></script>

</body>
</html>
